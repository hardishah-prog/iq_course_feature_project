version: "3.9"

services:
  # ──────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: iq_db
    restart: always
    environment:
      POSTGRES_USER: iquser
      POSTGRES_PASSWORD: iqpass
      POSTGRES_DB: iqdb
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U iquser -d iqdb" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: iq_redis
    restart: always
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────
  # FastAPI Application
  # ──────────────────────────────────────────
  api:
    build: .
    container_name: iq_api
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://iquser:iqpass@db:5432/iqdb
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8005:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./static:/app/static

  # ──────────────────────────────────────────
  # RQ Background Worker
  # ──────────────────────────────────────────
  worker:
    build: .
    container_name: iq_worker
    restart: always
    command: python worker.py
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://iquser:iqpass@db:5432/iqdb
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pg_data:
